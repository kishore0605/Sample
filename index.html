<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pega Create Case on Button Click</title>

    <!-- Pega Web Embed Script -->
    <script src="https://tsystems09.pegalabs.io/prweb/PRRestService/c11nsvc/v1/pega-embed.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }
        #startBtn {
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
        }
        #embedContainer {
            margin-top: 24px;
        }
    </style>
</head>
<body>

    <h2>Create DocuSign Case</h2>

    <!-- Button to start the case -->
    <button id="startBtn">Start Case</button>

    <!-- Pega Embed -->
    <div id="embedContainer">
        <pega-embed
            id="theEmbed"
            action="createCase"
            caseTypeID="Cata-Docusign-Work-DocusignTemplate"
            themeID="pyWebSelfService"
            casePage="fullSelfService"
            appAlias="docusign-comp"
            pegaServerUrl="https://tsystems09.pegalabs.io/prweb/"
            autoReauth="true"
            userIdentifier="kishore.kumar"
            password= "QmFuZ2Fsb3JlQDEyMw=="

         
        </pega-embed>
    </div>

    <script>
        document.getElementById("startBtn").addEventListener("click", function () {
            const embed = document.getElementById("theEmbed");

            // Show the embed
            embed.style.display = "block";

            // Start the case explicitly
            if (embed && typeof embed.start === "function") {
                embed.start();
            } else {
                console.error("Pega embed not initialized yet.");
            }
        });
    </script>

</body>
</html>
