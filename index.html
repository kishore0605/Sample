<!DOCTYPE html>
<html>
<head>
    <title>T-Systems Embed Launcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        img {
            max-width: 200px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

        /* Hidden container initially */
        .container {
            display: none;
            opacity: 0;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            margin-top: 40px;
            transition: opacity 1s ease; /* Fade-in */
        }

        /* Applied after injected content is ready */
        .fade-in {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Launch T‑Systems Portal</h1>

    <!-- CLICKABLE IMAGE -->
    <img id="launchEmbedBtn" src="https://logodix.com/logo/350465.png" alt="T-Systems Logo">

    <p>Click the image above to load the Pega portal.</p>
</div>

<!-- Hidden container -->
<div id="embedContainer" class="container">
    <h2>Embedded Application</h2>

    <!-- Placeholder where the embed will appear -->
    <div id="pegaHolder"></div>
</div>

<script>
    document.getElementById("launchEmbedBtn").addEventListener("click", function () {

        const container = document.getElementById("embedContainer");

        // Show container (still transparent)
        container.style.display = "block";

        // Load Pega script dynamically
        var s = document.createElement("script");
        s.src = "https://tsystems09.pegalabs.io/prweb/PRRestService/c11nsvc/v1/pega-embed.js";
        document.body.appendChild(s);

        s.onload = function () {

            const embed = document.createElement("pega-embed");

            // ✅ Your NEW PROPS (as requested)
            embed.setAttribute("id", "theEmbed");
            embed.setAttribute("action", "openPage");
            embed.setAttribute("pageID", "pyHome1");
            embed.setAttribute("pageClass", "Data-Portal");
            embed.setAttribute("themeID", "pyWebSelfService");
            embed.setAttribute("casePage", "simplifiedAssignment");
            embed.setAttribute("appAlias", "docusign-comp");
            embed.setAttribute("pegaServerUrl", "https://tsystems09.pegalabs.io/prweb/");
            embed.setAttribute("autoReauth", "true");
            embed.setAttribute("authService", "pega");
            embed.setAttribute("clientId", "14873473185211829429");
            embed.setAttribute("style", "width:100%");

            document.getElementById("pegaHolder").appendChild(embed);

            // Fade-in animation after embed is inserted
            setTimeout(() => {
                container.classList.add("fade-in");
            }, 50);
        };
    });
</script>

</body>
</html>
