<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pega Login → Web Embed Launcher</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #333;
    }

    header {
      background: #003b5c;
      color: #fff;
      padding: 14px 20px;
      text-align: center;
      font-size: 18px;
    }

    .center {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    button {
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #0078d4;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #005fa3;
    }

    /* Embed area */
    #embedSection {
      display: none;
      width: 100%;
      height: calc(100vh - 60px);
    }

    pega-embed {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <header>Pega Application</header>

  <!-- STEP 1: Login Screen -->
  <div id="loginSection" class="center">
    <h2>Login to Pega</h2>

    <p>You will be redirected to the Pega login page.</p>

    <!-- ✅ Pega login opens in same tab -->
    <a
      href="https://tsystems09.pegalabs.io/prweb/"
      target="_self"
    >
      <button>Login</button>
    </a>

    <p style="font-size: 13px; color: #666; max-width: 420px; text-align: center;">
      After successful login, return to this page and click
      <strong>Launch Application</strong>.
    </p>

    <button onclick="showEmbed()">Launch Application</button>
  </div>

  <!-- STEP 2: Web Embed -->
  <div id="embedSection">
    <!-- Load Pega Embed script ONLY when needed -->
    <script
      src="https://tsystems09.pegalabs.io/prweb/PRRestService/c11nsvc/v1/pega-embed.js"
      defer
    ></script>

    <pega-embed
      id="theEmbed"
      action="openPage"
      pageID="pyHome1"
      pageClass="Data-Portal"
      themeID="pyWebSelfService"
      casePage="fullSelfService"
      appAlias="docusign-comp"
      pegaServerUrl="https://tsystems09.pegalabs.io/prweb/"
      autoReauth="true"
      authService="pega"
      clientId="10499839826215351154"
      style="width:100%; height:100%;">
    </pega-embed>
  </div>

  <script>
    function showEmbed() {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("embedSection").style.display = "block";
    }
  </script>
</body>
</html>
